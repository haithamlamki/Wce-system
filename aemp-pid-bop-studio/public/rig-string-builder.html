<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rig String Builder — BHA · Pipe Tally · Ton-Mile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1b23;--panel:#132630;--panel-2:#1b3440;--steel-900:#28414c;--steel-600:#5c727c;
  --steel-400:#93a5ac;--steel-200:#c9d3d6;--paper:#f3f5f4;--paper-2:#ffffff;--line:#d7dedd;--line-dark:#24404c;
  --amber:#f5a524;--amber-deep:#c47c07;--link:#1f9d63;--link-tint:#e6f5ec;--danger:#d9503f;--danger-tint:#fbe7e4;
  --disp:"Barlow Semi Condensed",-apple-system,Segoe UI,Roboto,sans-serif;--mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:var(--disp);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
.appbar{background:var(--ink);color:#eaf1f2;border-bottom:3px solid var(--amber);position:sticky;top:0;z-index:40}
.appbar-inner{display:flex;align-items:stretch;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;padding:12px 18px}
.mark{width:34px;height:34px;flex:none;position:relative;background:var(--amber);border-radius:3px;box-shadow:inset 0 0 0 2px var(--ink);display:grid;place-items:center}
.mark::before{content:"";width:4px;height:20px;background:var(--ink)}
.mark::after{content:"";position:absolute;bottom:4px;width:16px;height:4px;background:var(--ink)}
.brand h1{font-size:19px;line-height:1;margin:0;letter-spacing:.3px;font-weight:700;text-transform:uppercase}
.brand .sub{font-size:11px;color:var(--steel-400);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.appbar-spacer{flex:1 1 auto}
.tools{display:flex;align-items:center;gap:6px;padding:10px 14px;flex-wrap:wrap}
.tbtn{font-family:var(--disp);font-size:12.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#cfe0e4;background:var(--panel-2);border:1px solid var(--line-dark);padding:8px 12px;border-radius:4px;cursor:pointer;white-space:nowrap}
.tbtn:hover{background:var(--steel-900);color:#fff}
.tbtn.warn:hover{background:var(--danger);border-color:var(--danger)}
.tbtn.gear{background:var(--amber);color:var(--ink);border-color:var(--amber-deep)}
.tbtn.gear:hover{background:#ffb733}
.wellstrip{background:var(--panel);border-top:1px solid var(--line-dark)}
.wellstrip-inner{display:flex;flex-wrap:wrap}
.wf{display:flex;flex-direction:column;padding:8px 14px;border-right:1px solid var(--line-dark);flex:1 1 130px;min-width:120px}
.wf label{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--steel-400);margin-bottom:3px}
.wf input{font-family:var(--mono);font-size:13px;background:transparent;border:0;border-bottom:1px solid transparent;color:#f0f6f7;padding:2px 0;width:100%}
.wf input:focus{outline:none;border-bottom-color:var(--amber)}
.tabs{display:flex;background:var(--ink);padding:0 12px;overflow-x:auto}
.tab{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.6px;text-transform:uppercase;color:var(--steel-400);background:transparent;border:0;border-top:3px solid transparent;padding:13px 20px 12px;cursor:pointer;white-space:nowrap}
.tab .cnt{font-family:var(--mono);font-size:11px;color:var(--steel-600);margin-left:7px}
.tab[aria-selected="true"]{color:var(--ink);background:var(--paper);border-top-color:var(--amber);border-radius:6px 6px 0 0}
.tab[aria-selected="true"] .cnt{color:var(--amber-deep)}
.wrap{max-width:1560px;margin:0 auto;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
@media(max-width:1080px){.wrap{grid-template-columns:1fr}}
.rail{position:sticky;top:150px}
@media(max-width:1080px){.rail{position:static}}
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.card + .card{margin-top:14px}
.card h2{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;margin:0;padding:11px 14px;color:var(--panel);background:linear-gradient(var(--paper),#eaeeec);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.card h2 .dot{width:8px;height:8px;border-radius:2px;background:var(--amber)}
.summary-body{padding:6px 14px 14px;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.metric{background:var(--paper-2);padding:10px 4px 8px}
.metric .v{font-family:var(--mono);font-weight:600;font-size:20px;line-height:1;color:var(--ink)}
.metric .v small{font-size:11px;color:var(--steel-600);font-weight:500;margin-left:2px}
.metric .k{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--steel-600);margin-top:5px}
.metric.hero{grid-column:1/3;background:var(--ink)}
.metric.hero .v{color:var(--amber);font-size:27px}
.metric.hero .k{color:var(--steel-400)}
.metric.linked .v{color:var(--link)}
.schematic{display:flex;gap:12px;padding:14px}
.gauge{width:58px;flex:none}
.leg{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
.legrow{display:flex;align-items:flex-start;gap:9px;font-size:12.5px}
.legrow .sw{width:14px;height:14px;border-radius:3px;flex:none;margin-top:1px}
.legrow b{font-family:var(--mono);font-weight:600;display:block}
.legrow span{color:var(--steel-600);font-size:11px;letter-spacing:.4px;text-transform:uppercase}
.linknote{font-size:11.5px;color:var(--steel-600);padding:0 14px 14px;line-height:1.5}
.linknote b{color:var(--link)}
/* slip/cut mini status in rail */
.slipcut{padding:12px 14px;border-top:1px solid var(--line)}
.bar{height:9px;border-radius:5px;background:#e7ecea;overflow:hidden;margin:6px 0 3px}
.bar > i{display:block;height:100%;border-radius:5px}
.scrow{margin-bottom:12px}
.scrow .lab{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--steel-600)}
.scrow .lab b{font-family:var(--mono);color:var(--ink)}
.builder{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;overflow:hidden;min-height:400px}
.bhead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:linear-gradient(var(--paper-2),#f7f9f8)}
.bhead h2{font-size:17px;margin:0;letter-spacing:.4px;text-transform:uppercase;font-weight:700}
.bhead .hint{font-size:12px;color:var(--steel-600)}
.bhead .grow{flex:1}
.abtn{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.4px;text-transform:uppercase;border:1px solid var(--steel-900);background:var(--ink);color:#fff;padding:8px 13px;border-radius:5px;cursor:pointer}
.abtn:hover{background:var(--panel-2)}
.abtn.amber{background:var(--amber);color:var(--ink);border-color:var(--amber-deep)}
.abtn.amber:hover{background:#ffb733}
.abtn.ghost{background:transparent;color:var(--panel);border-color:var(--line)}
.abtn.ghost:hover{background:var(--paper);border-color:var(--steel-400)}
.palette{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px dashed var(--line);background:#fbfcfb;align-items:center}
.chip{font-family:var(--disp);font-size:12px;font-weight:500;letter-spacing:.3px;border:1px solid var(--line);background:var(--paper-2);color:var(--panel);padding:6px 10px;border-radius:20px;cursor:pointer}
.chip:hover{border-color:var(--amber);background:#fff8ec}
.tscroll{overflow:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;z-index:2;background:var(--panel);color:#dce8ea;font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.7px;text-transform:uppercase;padding:9px 8px;text-align:right;white-space:nowrap;border-bottom:2px solid var(--amber)}
thead th.l{text-align:left}
thead th.linkcol{color:var(--link);background:#0e2a20}
tbody td{padding:0;border-bottom:1px solid var(--line);text-align:right;background:var(--paper-2)}
tbody tr:hover td{background:#fbfdfc}
tbody tr.standstart td{border-top:2px solid var(--steel-400)}
td input{font-family:var(--mono);font-size:13px;border:0;background:transparent;padding:8px;width:100%;text-align:right;color:var(--ink)}
td input.l{text-align:left;font-family:var(--disp)}
td input:focus{outline:2px solid var(--amber);outline-offset:-2px;background:#fffdf6;border-radius:2px}
td.calc{padding:8px;font-family:var(--mono);color:var(--steel-600)}
td.calc.strong{color:var(--ink);font-weight:600}
td.linked{padding:8px;font-family:var(--mono);color:var(--link);font-weight:600;background:var(--link-tint)}
tbody tr:hover td.linked{background:#d9efe1}
td.idx{padding:8px;font-family:var(--mono);color:var(--steel-400);text-align:center;font-size:12px}
td.stand{font-family:var(--mono);color:var(--amber-deep);font-weight:600;text-align:center;padding:8px}
td.act{text-align:center;padding:0 6px}
.rm{border:0;background:transparent;color:var(--steel-400);cursor:pointer;font-size:16px;line-height:1;padding:6px;border-radius:4px}
.rm:hover{color:#fff;background:var(--danger)}
.jarcell{text-align:center;padding:6px}.jarcell input{width:16px;height:16px;accent-color:var(--amber-deep);cursor:pointer}
tr.warnrow td{background:var(--danger-tint)!important}
td.flag{padding:4px 6px;text-align:center;font-size:15px}
.empty{padding:44px 20px;text-align:center;color:var(--steel-600)}
.empty h3{margin:0 0 6px;font-size:16px;color:var(--panel)}
.params{border-top:1px solid var(--line);background:#f7f9f8;padding:14px 16px}
.params h3{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--steel-600);margin:0 0 10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.pf{display:flex;flex-direction:column}
.pf label{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--steel-600);margin-bottom:3px}
.pf input,.pf select{font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:4px;padding:7px 8px;background:#fff;color:var(--ink)}
.pf input:focus,.pf select:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 2px #f5a52433}
.pf .auto{font-size:10px;color:var(--link);cursor:pointer;margin-top:3px;letter-spacing:.4px;text-transform:uppercase}
.pf .auto:hover{text-decoration:underline}
.stripe{padding:9px 16px;background:var(--ink);color:#cfe0e4;font-size:12px;display:flex;gap:22px;flex-wrap:wrap;align-items:center}
.stripe b{font-family:var(--mono);color:#fff}.stripe .lk{color:var(--amber)}
/* alarm banner */
.alarm{margin:0;padding:14px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.alarm.ok{background:var(--link-tint)}
.alarm.slip{background:#fff4e0}
.alarm.cut{background:var(--danger-tint)}
.alarm .sig{width:46px;height:46px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:24px;color:#fff}
.alarm.ok .sig{background:var(--link)}
.alarm.slip .sig{background:var(--amber-deep);animation:pulse 1.4s infinite}
.alarm.cut .sig{background:var(--danger);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #0002}50%{box-shadow:0 0 0 8px #0000}}
.alarm .msg{flex:1;min-width:200px}
.alarm .msg h3{margin:0 0 3px;font-size:16px;letter-spacing:.4px;text-transform:uppercase}
.alarm .msg p{margin:0;font-size:12.5px;color:var(--steel-900)}
.alarm .metv{text-align:right}
.alarm .metv .v{font-family:var(--mono);font-weight:600;font-size:17px}
.alarm .metv .k{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--steel-600)}
@media(prefers-reduced-motion:reduce){.alarm .sig{animation:none!important}}
/* modal */
.overlay{position:fixed;inset:0;background:#0e1b23cc;display:none;place-items:center;z-index:60;padding:18px;overflow:auto}
.overlay.on{display:grid}
.modal{background:var(--paper-2);border-radius:10px;max-width:460px;width:100%;overflow:hidden;border:1px solid var(--line);margin:auto}
.modal.wide{max-width:720px}
.modal h3{margin:0;padding:15px 18px;font-size:15px;letter-spacing:.5px;text-transform:uppercase;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between}
.modal h3 .x{cursor:pointer;color:var(--steel-400);font-size:20px;line-height:1}
.modal .body{padding:18px;max-height:70vh;overflow:auto}
.modal .sect{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--amber-deep);font-weight:700;margin:4px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.modal .sect:not(:first-child){margin-top:22px}
.modal .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.modal .row{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);background:#f7f9f8}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:6px;font-size:13px;opacity:0;transition:.25s;z-index:70;border-left:3px solid var(--link)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{
  .appbar,.rail,.palette,.bhead .abtn,.act,.tools,.stripe .lk,.flag{display:none!important}
  .wrap{display:block;max-width:none;padding:0}.builder{border:0}
  thead th{color:#000;background:#eee;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.linked{background:#eee;color:#000}
}
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div><h1>Rig String Builder</h1><div class="sub">BHA · Pipe Tally · Ton-Mile</div></div>
    </div>
    <div class="appbar-spacer"></div>
    <div class="tools">
      <button class="tbtn gear" id="btnSettings">⚙ Settings &amp; units</button>
      <button class="tbtn" id="btnBhaCsv">BHA CSV</button>
      <button class="tbtn" id="btnPipeCsv">Tally CSV</button>
      <button class="tbtn" id="btnTmCsv">TM CSV</button>
      <button class="tbtn" id="btnDailyCsv">Daily CSV</button>
      <button class="tbtn" id="btnSave">Save .json</button>
      <button class="tbtn" id="btnLoad">Load</button>
      <button class="tbtn" id="btnPrint">Print</button>
      <button class="tbtn warn" id="btnReset">Reset</button>
      <input type="file" id="fileInput" accept="application/json" hidden>
    </div>
  </div>
  <div class="wellstrip"><div class="wellstrip-inner" id="wellStrip"></div></div>
  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-tab="bha" aria-selected="true">Bottom Hole Assembly <span class="cnt" id="tabBhaCnt"></span></button>
    <button class="tab" role="tab" data-tab="pipe" aria-selected="false">Pipe Tally <span class="cnt" id="tabPipeCnt"></span></button>
    <button class="tab" role="tab" data-tab="tm" aria-selected="false">Ton-Mile <span class="cnt" id="tabTmCnt"></span></button>
    <button class="tab" role="tab" data-tab="daily" aria-selected="false">Daily Updates <span class="cnt" id="tabDailyCnt"></span></button>
    <button class="tab" role="tab" data-tab="rot" aria-selected="false">Rotating Hrs <span class="cnt" id="tabRotCnt"></span></button>
    <button class="tab" role="tab" data-tab="pumps" aria-selected="false">Mud Pumps <span class="cnt" id="tabPumpsCnt"></span></button>
    <button class="tab" role="tab" data-tab="trip" aria-selected="false">Trip Sheet <span class="cnt" id="tabTripCnt"></span></button>
    <button class="tab" role="tab" data-tab="kill" aria-selected="false">Kill Sheet</button>
    <button class="tab" role="tab" data-tab="form" aria-selected="false">Formulas</button>
  </div>
</header>

<main class="wrap">
  <aside class="rail">
    <section class="card">
      <h2><span class="dot"></span> String Summary</h2>
      <div class="summary-body" id="summary"></div>
      <div class="schematic">
        <svg class="gauge" id="gauge" viewBox="0 0 58 260" aria-label="Drill string schematic"></svg>
        <div class="leg" id="legend"></div>
      </div>
      <p class="linknote">The <b>BHA length</b> feeds the Pipe Tally offset, and total depth (BHA + pipe) feeds the <b>Ton-Mile</b> log.</p>
      <div class="slipcut" id="slipcut"></div>
    </section>
  </aside>
  <section id="builderSlot"></section>
</main>

<!-- bulk add joints -->
<div class="overlay" id="bulkOverlay">
  <div class="modal">
    <h3>Add joints in bulk <span class="x" data-close="bulk">×</span></h3>
    <div class="body">
      <div class="pf" style="margin-bottom:12px"><label>How many joints (singles)</label><input type="number" id="bulkCount" value="30" min="1" step="1"></div>
      <div class="pf" style="margin-bottom:12px"><label>Typical joint length</label><input type="number" id="bulkLen" value="9.65" step="0.01"></div>
      <div class="pf" style="margin-bottom:12px"><label>Connection</label><input type="text" id="bulkConn" value="4 ½'' IF"></div>
      <div class="pf"><label>Remarks</label><input type="text" id="bulkRemark" value=""></div>
    </div>
    <div class="row"><button class="abtn ghost" data-close="bulk">Cancel</button><button class="abtn amber" id="bulkAdd">Add joints</button></div>
  </div>
</div>

<!-- settings + units -->
<div class="overlay" id="setOverlay">
  <div class="modal wide">
    <h3>Settings &amp; units <span class="x" data-close="set">×</span></h3>
    <div class="body" id="setBody"></div>
    <div class="row"><button class="abtn amber" data-close="set">Done</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ===================================================== UNITS ===================================================== */
const UNIT_DEFS = {
  len:  {label:'Length / depth', canon:'m',   opts:{m:{f:1,l:'m'}, ft:{f:3.280839895,l:'ft'}}},
  wt:   {label:'Weight (mass)',  canon:'kg',  opts:{kg:{f:1,l:'kg'}, t:{f:0.001,l:'t'}, lb:{f:2.20462262,l:'lb'}, klb:{f:0.00220462,l:'klb'}}},
  force:{label:'Hookload',       canon:'daN', opts:{daN:{f:1,l:'daN'}, tf:{f:1/980.665,l:'tf'}, klbf:{f:1/444.82216,l:'klbf'}}},
  work: {label:'Ton-mile / work',canon:'tm',  opts:{tm:{f:1,l:'ton·mi'}, tkm:{f:1.459972,l:'t·km'}, mnm:{f:14.31693,l:'MN·m'}}},
  mud:  {label:'Mud weight',     canon:'sg',  opts:{sg:{f:1,l:'SG'}, ppg:{f:8.345404,l:'ppg'}}},
  press:{label:'Pump pressure',  canon:'psi', opts:{psi:{f:1,l:'psi'}, bar:{f:0.06894757,l:'bar'}, kPa:{f:6.894757,l:'kPa'}}},
  temp: {label:'Temperature',    canon:'C',   opts:{C:{f:1,l:'°C'}, F:{f:1,l:'°F'}}},
  vol:  {label:'Volume (mud)',   canon:'bbl', opts:{bbl:{f:1,l:'bbl'}, m3:{f:0.15898729,l:'m³'}}},
};
const state = {
  units:{len:'m', wt:'kg', force:'daN', work:'tm', mud:'sg', press:'psi', temp:'C', vol:'bbl'},
  well:{ rig:"205", well:"ABBN-20", date:"2025-10-31", section:'8.5"', dp:"5\" DP" },
  bha:{ rows:[], mudSG:1.15, bfManual:false, bfVal:0, circ:"2.5–3.0 m³/min", bit:"", make:"Smith", nozzle:"", tfa:0.994 },
  pipe:{ perStand:3, bhaOverride:false, bhaManual:0, rows:[], _lastLen:9.65, _lastConn:"4 ½'' IF" },
  tm:{
    rows:[],
    prev:{ sinceCut:1200, sinceSlip:1200, accu:103983, lineRem:1097 }, // carried from previous month
    params:{
      drawworks:"1320-UDBE 1800HP", drumDia:'30" x 56¼"', derrick:'144 ft',
      crown:'6 x 52", 1 x 60"', travelling:'6 x 60"', tbaWeight:25,
      lineMaker:"Brunton Wolf W/R", lineSize:'1 3/8"', lineLength:2286, lineGrade:"EIPS 6x19S 854kN", reel:"2",
      dateOn:"2025-10-01", dateOff:"",
      tmGoalPerFoot:20, lengthOfSlip:12, lengthOfCut:24,
      tmBetweenSlips:800, tmBetweenCuts:1600, noOfLines:12, lineStart:1073
    }
  },
  // ---- shared DAILY UPDATES record: the single daily entry that feeds rotating hours & mud pumps ----
  daily:{ rows:[] }, // {id,date,depth,rotHrs,mp1,mp2,mp3,mudSG,visc,sand,temp,spm,press,remark}
  // ---- ROTATING HOURS: per-tool accumulation toward inspection ----
  rot:{ inspInterval:200, tools:[] }, // tool: {id,type,size,serial,baseWell,baseInsp,lastInsp,inString}
  // ---- MUD PUMPS: per-pump operating hours + consumable part life ----
  pumps:{ list:[] }, // pump:{id,name,serial,type,liner,base,parts:[{id,name,limit,base,lastChg}]}
  // ---- TRIP SHEET: POOH / RIH displacement vs trip tank ----
  trip:{ mode:'POOH', tubular:'5" 19.5# DP', wet:false, tolStand:0.5, tolAccum:2, rows:[] },
  // rows: {id,tankStart,tankFinish,remark}
  // ---- KILL SHEET: IWCF surface BOP vertical well (API field units) ----
  kill:{
    cmw:'', lopPress:'', mwAtTest:'',
    shoeSize:9.625, shoeID:8.681, shoeMD:'', shoeTVD:'',

/* ===================================================== COMPUTE ===================================================== */
function bhaCompute(){
  const r=state.bha.rows; let cumL=0,cumW=0;
  r.forEach(x=>{cumL+=(+x.len||0);cumW+=(+x.wt||0);x._cumL=cumL;x._cumW=cumW;});
  const factor=state.bha.bfManual?(+state.bha.bfVal||0):bfFromSG(state.bha.mudSG);
  let jarIdx=-1; r.forEach((x,i)=>{if(x.jar&&jarIdx<0)jarIdx=i;});
  let belowLen=0,belowAir=0; if(jarIdx>=0){for(let i=0;i<jarIdx;i++){belowLen+=(+r[i].len||0);belowAir+=(+r[i].wt||0);}}
  return {totalLen:cumL,airWt:cumW,mudWt:cumW*factor,factor,jarIdx,belowLen,belowAir,belowMud:belowAir*factor};
}
function bhaLength(){ return bhaCompute().totalLen; }
function pipeCompute(){
  const p=state.pipe,n=p.perStand;
  const bhaLen=p.bhaOverride?(+p.bhaManual||0):bhaLength();
  let cum=0;
  p.rows.forEach((x,i)=>{
    cum+=(+x.len||0); x._cum=cum;
    x._standStart=(i%n===0); x._standNo=Math.floor(i/n)+1; x._cumDpBha=bhaLen+cum;
    if(x._standStart){let s=0;for(let k=i;k<Math.min(i+n,p.rows.length);k++)s+=(+p.rows[k].len||0);x._standLen=s;} else x._standLen=null;
  });
  return {bhaLen,dpLen:cum,stands:Math.ceil(p.rows.length/n),md:bhaLen+cum,joints:p.rows.length};
}
function currentMD(){ return pipeCompute().md; }

/* Ton-mile accumulation — reproduces the source sheet exactly */
function tmCompute(){
  const P=state.tm.params, pr=state.tm.prev;
  let sinceCut=+pr.sinceCut||0, sinceSlip=+pr.sinceSlip||0, accu=+pr.accu||0, lineRem=+pr.lineRem||0;
  state.tm.rows.forEach(row=>{
    const tot=(+row.tripTM||0)+(+row.drlgTM||0);
    const svc=(+row.service||1)||1;
    const actual=tot/svc;
    row._tot=tot; row._actual=actual;
    if(+row.cut>0) sinceCut=0; else sinceCut+=actual;
    if(+row.slip>0 || +row.cut>0) sinceSlip=0; else sinceSlip+=actual;
    accu+=actual; lineRem-=(+row.slip||0);
    row._sinceCut=sinceCut; row._sinceSlip=sinceSlip; row._accu=accu; row._lineRem=lineRem;
    row._slipWarn=(+row.slip||0)>P.lengthOfSlip;
    row._cutWarn=(+row.cut||0)>P.lengthOfCut;
  });
  const slipDue = sinceSlip>=P.tmBetweenSlips;
  const cutDue  = sinceCut>=P.tmBetweenCuts;
  return {sinceCut,sinceSlip,accu,lineRem,slipDue,cutDue,
    slipRatio:P.tmBetweenSlips?sinceSlip/P.tmBetweenSlips:0,
    cutRatio:P.tmBetweenCuts?sinceCut/P.tmBetweenCuts:0};
}

/* ===================================================== ROTATING HOURS ===================================================== */
function rotCompute(){
  const ds=dailySums();const iv=state.rot.inspInterval||0;
  const tools=state.rot.tools.map(t=>{
    const add=t.inString?ds.rot:0;
    const totalWell=(+t.baseWell||0)+add;
    const sinceAdd=t.inString?ds.sumSince('rotHrs',t.lastInsp||''):0;
    const sinceInsp=(+t.baseInsp||0)+sinceAdd;
    return {...t,totalWell,sinceInsp,due:iv>0&&sinceInsp>=iv,ratio:iv>0?sinceInsp/iv:0};
  });
  return {tools,dueCount:tools.filter(t=>t.due).length};
}
function importSerialsFromBHA(){
  let n=0;
  state.bha.rows.forEach(c=>{
    const sn=(c.serial||'').trim();
    if(!sn)return;
    if(state.rot.tools.some(t=>(t.serial||'').trim()===sn))return;
    state.rot.tools.push({id:nid(),type:c.desc||'Tool',size:c.od||'',serial:sn,baseWell:0,baseInsp:0,lastInsp:'',inString:true});
    n++;
  });
  recalc();toast(n?`${n} tool(s) imported from BHA`:'No new serials in BHA');
}

function tubRec(){ return TUBULARS.find(x=>x[0]===state.trip.tubular)||TUBULARS[3]; }
function tripCompute(){
  const t=state.trip, tub=tubRec();
  const perM = t.wet? tub[3] : tub[1];
  const perStd = t.wet? tub[4] : tub[2];
  const avg = tub[5];
  let th=0, ac=0;
  t.rows.forEach((r,i)=>{
    const D = (perStd!=null) ? perStd : perM*(+r.len||0);
    th+=D;
    const A=+r.tankStart||0, B=+r.tankFinish||0;
    const hasReading = r.tankStart!=='' && r.tankFinish!=='' && r.tankStart!=null && r.tankFinish!=null;
    const C = hasReading ? (t.mode==='POOH' ? (A-B) : (B-A)) : 0;
    ac+=C;
    const E = t.mode==='POOH' ? (D-C) : (C-D);
    const H = t.mode==='POOH' ? (th-ac) : (ac-th);
    r._D=D; r._F=th; r._C=hasReading?C:''; r._G=ac; r._E=hasReading?E:''; r._H=H; r._n=i+1;
    r._warn = hasReading && Math.abs(E)>t.tolStand;
  });
  const last=t.rows[t.rows.length-1];
  const accum = last? last._H : 0;
  return {perM,perStd,avg,thTotal:th,acTotal:ac,accum,
    alarm:Math.abs(accum)>t.tolAccum, gaining:accum>0, rows:t.rows};

function killAutoFill(){
  const k=state.kill,p=pipeCompute();
  const sum=re=>state.bha.rows.filter(r=>re.test(r.desc||'')).reduce((s,r)=>s+(+r.len||0),0);
  const hw=sum(/hwdp|heavy/i), dc=sum(/collar|\bdc\b/i);
  k.holeMD=p.md; k.holeTVD=p.md; // vertical well: TVD = MD

  k.vol.dpCap=capOf(k.dpID); k.vol.hwCap=capOf(3); k.vol.dcCap=capOf(k.dcID);
  const shoeMD=+k.shoeMD||0, holeMD=+k.holeMD||0;

function killCompute(){
  const k=state.kill;
  const cmw=toPpg(k.cmw!==''?k.cmw:state.bha.mudSG);
  const shoeTVDft=toFt(k.shoeTVD), holeTVDft=toFt(k.holeTVD);
  const A=+k.lopPress||0, B=toPpg(k.mwAtTest);
  const mamw = shoeTVDft? B + A/(shoeTVDft*0.052) : 0;
  const maasp= shoeTVDft? (mamw-cmw)*0.052*shoeTVDft : 0;
  const pump=k.pumps[k.activePump]||k.pumps[0];
  const displ=+pump.displ||0, spm=+pump.spm||0, pl=+pump.pl||0;
  const sidpp=+k.sidpp||0, sicp=+k.sicp||0, pitGain=+k.pitGain||0;
  const kmw = holeTVDft? cmw + sidpp/(holeTVDft*0.052) : cmw;
  const icp = pl + sidpp;
  const fcp = cmw? (kmw/cmw)*pl : 0;
  const K = icp-fcp;
  const V=k.vol;
  const mk=(lenM,cap)=>{const L=toFt(lenM),vol=L*(+cap||0);return {L,cap:+cap||0,vol,stk:displ?vol/displ:0,min:(displ&&spm)?(vol/displ)/spm:0};};
  const dp=mk(V.dpLen,V.dpCap), hw=mk(V.hwLen,V.hwCap), dc=mk(V.dcLen,V.dcCap);
  const D = dp.vol+hw.vol+dc.vol;
  const E = displ? D/displ : 0;
  const Emin = spm? E/spm : 0;
  const dcOh=mk(V.dcOhLen,V.dcOhCap), dpOh=mk(V.dpOhLen,V.dpOhCap), dpCsg=mk(V.dpCsgLen,V.dpCsgCap);
  const F = dcOh.vol+dpOh.vol;
  const G = dpCsg.vol;
  const H = F+G;
  const I = D+H;
  const J = +V.surfVol||0;
  const total = I+J;
  const annStk = displ? H/displ : 0, annMin = spm? annStk/spm : 0;
  const totStk = displ? I/displ : 0, totMin = spm? totStk/spm : 0;
  const per100 = E? K*100/E : 0;
  const shoeMD=+k.shoeMD||0, holeMD=+k.holeMD||0;
  const geomBad = holeMD>0 && shoeMD>0 && holeMD<shoeMD; // hole cannot be shallower than the shoe
  return {cmw,mamw,maasp,kmw,icp,fcp,K,per100,displ,spm,pl,sidpp,sicp,pitGain,
    dp,hw,dc,D,E,Emin,dcOh,dpOh,dpCsg,F,G,H,I,J,total,annStk,annMin,totStk,totMin,
    maaspExceeded: maasp>0 && sicp>maasp, geomBad, shoeMD, holeMD, shoeTVDft, holeTVDft};
}

function recalc(soft){
  if(soft){
    if(state.view==='bha')updateBhaCalc();
    else if(state.view==='pipe')updatePipeCalc();
    else if(state.view==='tm')updateTmCalc();
    else if(state.view==='daily')updateDailyCalc();
    else if(state.view==='rot')updateRotCalc();
    else if(state.view==='pumps')updatePumpsCalc();
    else if(state.view==='trip')updateTripCalc();
    else if(state.view==='kill')updateKillCalc();
    renderSummary();return;
  }

}

  const bw=[420,360,510,690,690,180,690,120,120], bi=[10,30,0,60,20,95,0,15,40]; // lifetime & since-inspection bases
  state.rot.tools.forEach((t,i)=>{ t.baseWell=bw[i]||0; t.baseInsp=bi[i]||0; });
  // Mud pumps with prior operating hours + part life already accrued (hours since last change)
  ensurePumps();
  const partBase=[290,180,120,180,80,160,110,90,2845], pumpTotals=[2845,2210,1980];
  state.pumps.list.forEach((p,i)=>{ p.base=pumpTotals[i]; p.serial=['1202','1203','1204'][i]; p.parts.forEach((pt,j)=>{pt.base=partBase[j]||0;}); });
  // Trip sheet — POOH 5" 19.5# dry: theoretical 0.813 bbl/std, tank drawn down each stand
  state.trip.mode='POOH';state.trip.tubular='5" 19.5# DP';state.trip.wet=false;
  let lvl=62.0;
  [0.81,0.82,0.80,0.81,0.83,0.79,0.81,0.82].forEach(act=>{
    const start=lvl, finish=+(lvl-act).toFixed(2); lvl=finish;
    state.trip.rows.push({id:nid(),tankStart:start,tankFinish:finish,len:28.9,remark:''});
  });
  // Kill sheet — self-consistent example well: 9 5/8" shoe @ 2,000 m, 8 1/2" hole to 3,515 m
  // (matches the final depth in the daily record). "Auto-fill from string" re-links it to the live tally.
  const K=state.kill;
  K.lopPress=1200; K.mwAtTest=1.15; K.cmw=1.38;
  K.shoeSize=9.625; K.shoeID=8.681; K.shoeMD=2000; K.shoeTVD=2000;
  K.holeSize=8.5; K.holeMD=3515; K.holeTVD=3515;
  K.dpOD=5; K.dpID=4.276; K.dcOD=8; K.dcID=3;
  K.pumps=[{displ:0.102,spm:30,pl:800},{displ:0.102,spm:30,pl:820}];
  K.sidpp=400; K.sicp=500; K.pitGain=10;
  K.vol.dpLen=3085; K.vol.hwLen=250; K.vol.dcLen=180;      // sums to 3,515 m of string
  K.vol.dpCap=capOf(K.dpID); K.vol.hwCap=capOf(3); K.vol.dcCap=capOf(K.dcID);
  K.vol.dcOhLen=180; K.vol.dpOhLen=1335; K.vol.dpCsgLen=2000; // open hole = 3515 − 2000 = 1515 m
  K.vol.dcOhCap=annOf(K.holeSize,K.dcOD); K.vol.dpOhCap=annOf(K.holeSize,K.dpOD); K.vol.dpCsgCap=annOf(K.shoeID,K.dpOD);
  K.vol.surfVol=200;
}
function importSerialsSilent(){
  state.bha.rows.forEach(c=>{const sn=(c.serial||'').trim();if(!sn)return;if(state.rot.tools.some(t=>(t.serial||'').trim()===sn))return;
    state.rot.tools.push({id:nid(),type:c.desc||'Tool',size:c.od||'',serial:sn,baseWell:0,baseInsp:0,lastInsp:'',inString:true});});
  // if BHA had no serials seeded, add a representative tool set so the tab isn't empty
  if(!state.rot.tools.length){
    [['8" Drill Collar',8,'205022'],['8" Drill Collar',8,'20502'],['Hydraulic Jar',8,'J-4471'],['12¼" Stab',12.25,'ST-889'],['5" HWDP',5,'794'],['5" HWDP',5,'793'],['MWD',8,'MWD-31'],['RSS',8.25,'RSS-77']]
      .forEach(([type,size,serial])=>state.rot.tools.push({id:nid(),type,size,serial,baseWell:0,baseInsp:0,lastInsp:'',inString:true}));
  }
}

/* ===================================================== INIT ===================================================== */
state.bha.bfVal=bfFromSG(state.bha.mudSG);
renderWell();seed();setTab('bha');renderSummary();
</script>
